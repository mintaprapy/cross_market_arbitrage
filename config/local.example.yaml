sources:
  tqsdk_domestic:
    params:
      auth_user: your_tqsdk_account
      auth_password: your_tqsdk_password
      md_url: wss://free-api.shinnytech.com/t/nfmd/front/mobile

notifiers:
  - name: console_alerts
    kind: console
    enabled: true
    min_severity: warning

  - name: webhook_alerts
    kind: webhook
    enabled: false
    min_severity: critical
    url: http://127.0.0.1:9000/alerts
    timeout_sec: 5

  - name: feishu_alerts
    kind: feishu
    enabled: false
    min_severity: warning
    url: https://open.feishu.cn/open-apis/bot/v2/hook/replace-me
    timeout_sec: 5

  - name: wecom_alerts
    kind: wecom
    enabled: false
    min_severity: critical
    url: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=replace-me
    timeout_sec: 5

  - name: telegram_alerts
    kind: telegram
    enabled: false
    min_severity: warning
    bot_token: replace-me
    chat_id: replace-me
    timeout_sec: 5
