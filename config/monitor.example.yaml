app:
  name: Cross Market Commodity Monitor
  timezone: Asia/Shanghai
  domestic_trading_calendar_path: domestic_trading_calendar.cn_futures.2026.yaml
  poll_interval_sec: 10
  fx_poll_interval_sec: 3600
  history_limit: 1000
  rolling_window_size: 120
  http_timeout_sec: 8
  sqlite_path: data/monitor.db
  fx_source: sina_fx
  fx_backup_sources: [frankfurter]
  bind_host: 127.0.0.1
  bind_port: 6080
  export_dir: exports
  fx_window_size: 60
  replay_target_daily_vol_pct: 0.015
  startup_history_backfill_enabled: true
  startup_history_backfill_range_key: 30d
  tqsdk_shadow_source: null
  tqsdk_shadow_enabled: false
  tqsdk_shadow_poll_interval_sec: 10
  tqsdk_startup_backfill_enabled: false
  tqsdk_startup_backfill_interval: 30m
  tqsdk_startup_backfill_range_key: 30d
  retention_enabled: true
  retention_interval_sec: 21600
  raw_quote_retention_days: 30
  fx_rate_retention_days: 30
  normalized_quote_retention_days: 30
  snapshot_retention_days: 180
  alert_retention_days: 30
  delivery_retention_days: 30

sources:
  sina_domestic:
    kind: sina_futures
    base_url: https://hq.sinajs.cn
    verify_ssl: true
    headers:
      Referer: https://finance.sina.com.cn
      User-Agent: Mozilla/5.0
  sina_fx:
    kind: sina_fx
    base_url: https://hq.sinajs.cn
    verify_ssl: true
    headers:
      Referer: https://finance.sina.com.cn
      User-Agent: Mozilla/5.0
    params:
      symbol: fx_susdcny
  tqsdk_domestic:
    kind: tqsdk_main
    base_url: wss://free-api.shinnytech.com/t/nfmd/front/mobile
    verify_ssl: true
    params:
      auth_user_env: TQSDK_USER
      auth_password_env: TQSDK_PASSWORD
      md_url_env: TQSDK_MD_URL
      login_retry_attempts: "3"
      history_retry_attempts: "3"
      retry_backoff_sec: "1.5"
      retry_max_backoff_sec: "8"
  binance_futures:
    kind: binance_futures
    base_url: https://fapi.binance.com
    verify_ssl: true
  okx_swap:
    kind: okx_swap
    base_url: https://www.okx.com
    verify_ssl: true
  hyperliquid:
    kind: hyperliquid
    base_url: https://api.hyperliquid.xyz
    verify_ssl: true
  cme_nymex:
    kind: cme_reference
    base_url: https://www.cmegroup.com/CmeWS/mvc/Quotes/Future
    verify_ssl: true
    headers:
      Accept: application/json
      Referer: https://www.cmegroup.com/
  frankfurter:
    kind: frankfurter_fx
    base_url: https://api.frankfurter.app
    verify_ssl: true

pairs:
  - group_name: AU_XAU
    domestic_source: sina_domestic
    domestic_symbol: nf_AU0
    domestic_label: SHFE AU Continuous
    domestic_history_source: tqsdk_domestic
    domestic_product_code: au
    domestic_candidates:
      - source: sina_domestic
        symbol: nf_AU0
        label: SHFE AU Continuous
    overseas_source: binance_futures
    overseas_symbol: XAUUSDT
    overseas_label: Binance XAUUSDT Perpetual
    overseas_candidates:
      - source: binance_futures
        symbol: XAUUSDT
        label: Binance XAUUSDT Perpetual
      - source: okx_swap
        symbol: XAU-USDT-SWAP
        label: OKX XAU Swap
    formula: gold
    target_unit: USD_PER_OUNCE
    domestic_unit: CNY_PER_GRAM
    tax_mode: gross
    hedge_contract_size: 32.1507
    trading_sessions_local: ["09:00-10:15", "10:30-11:30", "13:30-15:00", "21:00-02:30"]
    thresholds:
      spread_pct_abs: 0.02
      zscore_abs: 2.5
      spread_alert_above:
      spread_alert_below:
      stale_seconds: 180
      max_skew_seconds: 180
      alert_cooldown_seconds: 300
      fx_jump_abs_pct: 0.005
      pause_on_fx_jump: true
    costs:
      domestic_fee_bps: 1.0
      overseas_fee_bps: 1.0
      domestic_slippage_bps: 1.0
      overseas_slippage_bps: 1.0
      funding_bps_per_day: 0.5
