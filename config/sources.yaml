sources:
  sina_domestic:
    kind: sina_futures
    base_url: https://hq.sinajs.cn
    verify_ssl: true
    headers:
      Referer: https://finance.sina.com.cn
      User-Agent: Mozilla/5.0
  sina_fx:
    kind: sina_fx
    base_url: https://hq.sinajs.cn
    verify_ssl: true
    headers:
      Referer: https://finance.sina.com.cn
      User-Agent: Mozilla/5.0
    params:
      symbol: fx_susdcny
  tqsdk_domestic:
    kind: tqsdk_main
    base_url: wss://free-api.shinnytech.com/t/nfmd/front/mobile
    verify_ssl: true
    params:
      md_url: wss://free-api.shinnytech.com/t/nfmd/front/mobile
      login_retry_attempts: "3"
      history_retry_attempts: "3"
      retry_backoff_sec: "1.5"
      retry_max_backoff_sec: "8"
  binance_futures:
    kind: binance_futures
    base_url: https://fapi.binance.com
    verify_ssl: true
  okx_swap:
    kind: okx_swap
    base_url: https://www.okx.com
    verify_ssl: true
  gate_futures:
    kind: gate_futures
    base_url: https://api.gateio.ws
    verify_ssl: true
    params:
      settle: usdt
      history_page_limit: "1000"
      history_max_pages: "8"
  gate_tradfi:
    kind: gate_tradfi
    base_url: https://api.gateio.ws
    verify_ssl: true
    params:
      history_limit: "500"
  hyperliquid:
    kind: hyperliquid
    base_url: https://api.hyperliquid.xyz
    verify_ssl: true
  hyperliquid_xyz:
    kind: hyperliquid
    base_url: https://api.hyperliquid.xyz
    verify_ssl: true
    params:
      dex: xyz
  cme_nymex:
    kind: cme_reference
    base_url: https://www.cmegroup.com/CmeWS/mvc/Quotes/Future
    verify_ssl: true
    headers:
      Accept: application/json
      Referer: https://www.cmegroup.com/
  frankfurter:
    kind: frankfurter_fx
    base_url: https://api.frankfurter.app
    verify_ssl: true
