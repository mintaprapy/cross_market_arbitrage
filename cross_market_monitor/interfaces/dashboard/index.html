<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>跨市场价差监控</title>
    <link rel="stylesheet" href="/dashboard/styles.css?v=20260424a">

</head>
<body data-app-title="__APP_TITLE__">
  <div class="shell">
    <section class="hero">
      <h1>跨市场价差监控</h1>
      <div class="meta" id="meta"></div>
    </section>

    <section class="panel">
      <div class="table-wrap">
        <table class="instrument-summary-table">
          <thead>
            <tr>
              <th>标的</th>
              <th class="numeric-cell">国内价格</th>
              <th class="numeric-cell">一手价格</th>
              <th class="numeric-cell">国内换算价</th>
              <th class="numeric-cell">海外最新价</th>
              <th class="numeric-cell">海外卖出仓位</th>
              <th class="numeric-cell">理论价差</th>
              <th class="numeric-cell">价差百分比</th>
              <th class="numeric-cell">价差比例</th>
              <th class="numeric-cell">Z-Score</th>
            </tr>
          </thead>
          <tbody id="instrument-summary"></tbody>
        </table>
      </div>
    </section>

    <section class="grid" id="cards"></section>

    <section class="panel">
      <div class="head">
        <div class="title">
          <strong>回放研究</strong>
          <span>对冲比、实现波动率与成本修正后的信号复盘</span>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>监控组</th>
            <th>样本数</th>
            <th>价差百分比均值</th>
            <th>价差百分比标准差</th>
            <th>价差百分比中位数</th>
            <th>Z-Score</th>
            <th>当前分位数</th>
            <th>日波动率</th>
          </tr>
        </thead>
        <tbody id="replay"></tbody>
      </table>
    </section>

    <section class="panel">
      <div class="head">
        <div class="title">
          <strong>数据源健康</strong>
          <span>主源与备用源的可用状态</span>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>数据源</th>
            <th>类型</th>
            <th>成功</th>
            <th>失败</th>
            <th>最近成功</th>
            <th>最近标的</th>
            <th>延迟</th>
            <th>最近错误</th>
          </tr>
        </thead>
        <tbody id="sources"></tbody>
      </table>
    </section>
  </div>
    <script src="/dashboard/app.js?v=20260424a"></script>
</body>
</html>
